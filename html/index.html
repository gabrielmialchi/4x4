<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4×4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- START SCREEN (MATCH-001.3) — escolha de matchmaking + modo. Aparece antes do lobby
     a menos que a URL já traga ?sala=XXXX (atalho de link compartilhado). -->
<div id="start-screen">
    <div class="lobby-title"><em>4</em> × <em>4</em></div>
    <div class="gold-line"></div>

    <div class="ss-section">
        <div class="ss-section-label">Modo</div>
        <div class="ss-mode-toggle">
            <button id="ss-mode-1v1" class="ss-mode-btn">1v1</button>
            <button id="ss-mode-4v4" class="ss-mode-btn">
                4v4 <span class="ss-badge">EM BREVE</span>
            </button>
        </div>
    </div>

    <div class="ss-section ss-actions">
        <button id="ss-btn-random" class="ss-action-btn ss-action-primary">PROCURAR OPONENTE</button>
        <button id="ss-btn-create" class="ss-action-btn">CRIAR SALA PRIVADA</button>

        <div class="ss-join-row">
            <input id="ss-input-code" class="ss-input" type="text" maxlength="4"
                   placeholder="CÓDIGO" autocomplete="off" autocapitalize="characters">
            <button id="ss-btn-join" class="ss-action-btn ss-action-compact">ENTRAR</button>
        </div>
    </div>

    <div id="ss-error" class="ss-error" style="display:none"></div>
</div>

<!-- PRIVATE ROOM (MATCH-001.5) — exibida pós-create/join de sala privada enquanto não fecha -->
<div id="private-room-screen" style="display:none">
    <div class="lobby-title"><em>4</em> × <em>4</em></div>
    <div class="gold-line"></div>
    <p class="private-label">Sala privada</p>

    <div id="private-code" class="private-code" onclick="copyCode()" title="Clique para copiar">····</div>

    <div class="private-buttons">
        <button onclick="copyCode()" style="border-color:var(--gold);color:var(--gold)">COPIAR CÓDIGO</button>
        <button onclick="copyLink()" style="border-color:var(--p1);color:var(--p1)">COPIAR LINK</button>
    </div>

    <div class="private-players">
        <div class="private-players-title">JOGADORES <span id="private-players-count">0/0</span></div>
        <div id="private-players-list"></div>
    </div>
</div>

<!-- SEARCHING (Random Match) — animação enquanto a fila não pareia -->
<div id="searching-screen" style="display:none">
    <div class="lobby-title"><em>4</em> × <em>4</em></div>
    <div class="gold-line"></div>
    <p class="searching-label">Procurando oponente</p>
    <div class="searching-dots"><span></span><span></span><span></span></div>
    <button id="searching-btn-cancel" class="ss-action-btn searching-cancel">CANCELAR</button>
</div>

<!-- GAME -->
<div id="game-container" style="display:none">
    <div class="player-section">
        <div id="player-title">AGENTE</div>
        <div class="grid-wrapper">
            <div class="grid" id="grid-main"></div>
            <div class="pieces-layer" id="pieces-main"></div>
        </div>
        <div class="controls">
            <button id="btn-block"  onclick="setSkill('BLOCK')">◈ BARRICADA (2)</button>
            <button id="btn-trap"   onclick="setSkill('TRAP')">✦ ARMADILHA (2)</button>
            <button id="btn-sprint" onclick="setSkill('SPRINT')">⟫ AVANÇO (1)</button>
            <button id="btn-ready"  onclick="ready()">CONFIRMAR</button>
        </div>
        <div id="status-text">planejando...</div>
    </div>
</div>

<!-- COMBAT -->
<div id="combat-overlay">
    <div id="combat-title">CONFRONTO</div>
    <div class="combat-divider"></div>

    <div class="combat-arena">
        <div class="die-wrap">
            <div class="die-label" id="lbl-0" style="color:var(--p1)">Agente I</div>
            <div id="die-0" class="die idle" onclick="rollDie(0)">·</div>
            <div id="hint-0" class="die-hint">toque para rolar</div>
            <div id="math-0" class="die-math"></div>
        </div>

        <div class="combat-vs">VS</div>

        <div class="die-wrap">
            <div class="die-label" id="lbl-1" style="color:var(--p2)">Agente II</div>
            <div id="die-1" class="die idle" onclick="rollDie(1)">·</div>
            <div id="hint-1" class="die-hint">aguardando...</div>
            <div id="math-1" class="die-math"></div>
        </div>
    </div>

    <div id="combat-result"></div>
</div>

<!-- AFTERMATH -->
<div id="review-screen">
    <h1 id="winner-text">AFTERMATH</h1>
    <div id="after-grid-container" style="position:relative;width:max-content;margin:0 auto">
        <div id="after-grid" class="grid" style="background:var(--surf);border:1px solid var(--bdr2)"></div>
        <svg id="svg-paths" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10"></svg>
    </div>
    <div class="legend-text">
        ◈ = BARRICADA &nbsp;·&nbsp; ✦ = ARMADILHA &nbsp;·&nbsp; □ = CONFRONTO<br>
        <span style="opacity:.35;text-decoration:line-through;color:var(--text)">riscado</span> = destruído / desperdiçado
    </div>
    <button onclick="restartGame()" style="border-color:var(--btn-active);color:var(--btn-active);background:color-mix(in srgb, var(--btn-active) 7%, transparent);padding:14px 32px;letter-spacing:3px">NOVA MISSÃO</button>
</div>

<!-- LOG -->
<div id="log">>> 4×4 — Alpha 2.2 — Pronto.</div>

<!-- Socket.io client — comunicação com o server autoritativo no Railway. -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script type="module">
    import { initMultiplayer } from './network.js';
    import { syncUI } from './ui.js';
    initMultiplayer(syncUI);
</script>
</body>
</html>
