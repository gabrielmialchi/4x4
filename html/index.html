<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4×4 — Shadow Protocol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #04030a;
            --surf:     #0a0914;
            --surf2:    #0f0e1a;
            --bdr:      #1a1828;
            --bdr2:     #2e2a45;
            --p1:       #3b8fef;
            --p2:       #ef3b3b;
            --trap:     #9333ea;
            --combat:   #f5a623;
            --gold:     #c8a84b;
            --text:     #ddd6f3;
            --dim:      #5a5470;
            --gp1:      rgba(59,143,239,.35);
            --gp2:      rgba(239,59,59,.35);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;overflow:hidden}
        body{
            background:var(--bg);
            color:var(--text);
            font-family:'Rajdhani',sans-serif;
            user-select:none;
        }

        /* atmospheric bg gradient */
        body::before{
            content:'';
            position:fixed;inset:0;pointer-events:none;z-index:0;
            background:
                radial-gradient(ellipse 70% 50% at 15% 90%,rgba(59,143,239,.05) 0%,transparent 60%),
                radial-gradient(ellipse 70% 50% at 85% 10%,rgba(239,59,59,.05) 0%,transparent 60%);
        }

        /* scanline overlay */
        body::after{
            content:'';
            position:fixed;inset:0;pointer-events:none;z-index:0;
            background:repeating-linear-gradient(
                0deg,
                transparent,transparent 2px,
                rgba(255,255,255,.012) 2px,rgba(255,255,255,.012) 4px
            );
        }

        /* ─── LOBBY ───────────────────────────────────────── */
        #lobby-screen{
            position:fixed;inset:0;
            background:var(--bg);
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            gap:22px;z-index:6000;
            text-align:center;padding:40px;
        }
        .lobby-title{
            font-family:'Cinzel',serif;
            font-size:clamp(28px,6vw,48px);
            font-weight:900;
            letter-spacing:8px;
            color:var(--text);
        }
        .lobby-title em{color:var(--p1);font-style:normal}
        .lobby-sub{
            font-size:11px;letter-spacing:5px;
            text-transform:uppercase;color:var(--dim);
        }
        .gold-line{
            width:100px;height:1px;
            background:linear-gradient(90deg,transparent,var(--gold),transparent);
        }
        .link-box{
            background:var(--surf2);
            padding:14px 20px;border-radius:3px;
            font-family:'Share Tech Mono',monospace;
            color:var(--gold);cursor:pointer;
            border:1px solid var(--bdr2);
            word-break:break-all;max-width:90%;
            font-size:12px;letter-spacing:1px;
            transition:border-color .2s;
        }
        .link-box:hover{border-color:var(--gold)}

        /* ─── GAME CONTAINER ──────────────────────────────── */
        #game-container{
            display:flex;
            width:100vw;height:82vh;
            align-items:center;justify-content:center;
            position:relative;z-index:1;
        }
        .player-section{
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
        }
        #player-title{
            font-family:'Cinzel',serif;
            font-size:14px;
            letter-spacing:6px;
            text-transform:uppercase;
            margin-bottom:18px;
            font-weight:700;
        }

        /* ─── GRID ────────────────────────────────────────── */
        .grid-wrapper{position:relative}
        .grid{
            display:grid;
            grid-template-columns:repeat(4,75px);
            grid-template-rows:repeat(4,75px);
            gap:8px;padding:14px;
            background:var(--surf);
            border-radius:5px;
            border:1px solid var(--bdr2);
            box-shadow:0 0 80px rgba(0,0,0,.8),inset 0 0 40px rgba(0,0,0,.4);
        }
        .pieces-layer{
            position:absolute;top:0;left:0;
            width:100%;height:100%;
            pointer-events:none;
        }
        .cell{
            width:75px;height:75px;
            background:var(--surf2);
            border-radius:3px;
            border:1px solid var(--bdr);
            display:flex;align-items:center;justify-content:center;
            position:relative;
            transition:border-color .18s,box-shadow .18s;
        }
        .cell.fog{background:#02020a!important;border-color:#08070f!important}
        .cell.clickable{border-color:var(--bdr2);cursor:pointer}
        .cell.clickable:hover{border-color:var(--gold);box-shadow:inset 0 0 14px rgba(200,168,75,.12)}
        .cell.sprint-target{
            background:#110d03!important;
            border-color:var(--combat)!important;
            box-shadow:inset 0 0 18px rgba(245,166,35,.18)!important;
        }
        .cell.selected{
            border-color:var(--gold)!important;
            box-shadow:inset 0 0 18px rgba(200,168,75,.22)!important;
        }
        .cell-combat{
            border:1px solid var(--combat)!important;
            box-shadow:inset 0 0 14px rgba(245,166,35,.18)!important;
        }
        .broken{opacity:.35;text-decoration:line-through;filter:saturate(.25)}

        /* ─── PIECE ───────────────────────────────────────── */
        .piece{
            width:50px;height:50px;
            border-radius:50%;
            position:absolute;
            transition:all .45s cubic-bezier(.4,0,.2,1);
            z-index:100;
        }
        /* inner ring + diamond clan mark */
        .piece::before{
            content:'';position:absolute;inset:4px;
            border-radius:50%;
            border:1px solid rgba(255,255,255,.18);
        }
        .piece::after{
            content:'';position:absolute;
            width:14px;height:14px;
            border:2px solid rgba(255,255,255,.35);
            transform:rotate(45deg);
        }
        .p1-piece{
            background:radial-gradient(circle at 35% 35%,rgba(130,200,255,.5),var(--p1));
            box-shadow:0 0 22px var(--gp1),0 3px 10px rgba(0,0,0,.6);
        }
        .p2-piece{
            background:radial-gradient(circle at 35% 35%,rgba(255,130,130,.5),var(--p2));
            box-shadow:0 0 22px var(--gp2),0 3px 10px rgba(0,0,0,.6);
        }
        .trapped{
            border:2px solid var(--trap)!important;
            box-shadow:0 0 32px var(--trap),0 0 64px rgba(147,51,234,.25)!important;
            animation:trap-pulse .35s ease-in-out infinite alternate;
        }
        @keyframes trap-pulse{
            from{transform:scale(1) rotate(0deg)}
            to{transform:scale(1.06) rotate(4deg)}
        }

        /* ─── CONTROLS ────────────────────────────────────── */
        .controls{
            margin-top:20px;
            display:flex;gap:8px;
            flex-wrap:wrap;justify-content:center;
        }
        button{
            padding:10px 18px;
            border:1px solid var(--bdr2);
            border-radius:3px;
            background:transparent;
            color:var(--dim);
            font-family:'Rajdhani',sans-serif;
            font-weight:700;font-size:12px;
            letter-spacing:2.5px;text-transform:uppercase;
            cursor:pointer;
            transition:all .18s;
        }
        button:hover:not(:disabled){
            border-color:var(--gold);color:var(--gold);
            background:rgba(200,168,75,.05);
        }
        button.active{
            border-color:#22c55e;color:#22c55e;
            background:rgba(34,197,94,.07);
        }
        button#btn-ready{
            border-color:var(--gold);color:var(--gold);
            background:rgba(200,168,75,.06);
            font-size:13px;padding:12px 26px;letter-spacing:3px;
        }
        button#btn-ready:hover:not(:disabled){
            background:rgba(200,168,75,.16);
            box-shadow:0 0 22px rgba(200,168,75,.18);
        }
        button:disabled{opacity:.12;cursor:default}
        #status-text{
            margin-top:14px;
            color:var(--dim);font-size:11px;
            letter-spacing:2.5px;text-transform:uppercase;
            font-family:'Share Tech Mono',monospace;
        }

        /* ─── COMBAT OVERLAY ──────────────────────────────── */
        #combat-overlay{
            position:fixed;inset:0;
            background:#010008;
            display:none;
            flex-direction:column;
            align-items:center;justify-content:center;
            gap:0;z-index:5000;
            overflow:hidden;
        }

        /* edge atmospheric glow */
        #combat-overlay::before{
            content:'';position:absolute;inset:0;pointer-events:none;
            background:
                radial-gradient(ellipse 90% 45% at 50% 0%,rgba(239,59,59,.1) 0%,transparent 55%),
                radial-gradient(ellipse 90% 45% at 50% 100%,rgba(59,143,239,.08) 0%,transparent 55%),
                radial-gradient(ellipse 30% 80% at 0% 50%,rgba(147,51,234,.04) 0%,transparent 50%),
                radial-gradient(ellipse 30% 80% at 100% 50%,rgba(147,51,234,.04) 0%,transparent 50%);
        }

        /* scanlines on combat */
        #combat-overlay::after{
            content:'';position:absolute;inset:0;pointer-events:none;
            background:repeating-linear-gradient(
                0deg,
                transparent,transparent 3px,
                rgba(255,255,255,.018) 3px,rgba(255,255,255,.018) 6px
            );
        }

        #combat-title{
            font-family:'Cinzel',serif;
            font-size:clamp(24px,5vw,42px);
            font-weight:900;letter-spacing:14px;
            text-transform:uppercase;
            color:var(--combat);
            text-shadow:0 0 40px rgba(245,166,35,.55),0 0 90px rgba(245,166,35,.18);
            margin-bottom:8px;
            animation:title-flicker 5s ease-in-out infinite;
            position:relative;z-index:1;
        }
        @keyframes title-flicker{
            0%,89%,91%,93%,100%{opacity:1}
            90%{opacity:.6}
            92%{opacity:.9}
        }

        .combat-divider{
            width:180px;height:1px;
            background:linear-gradient(90deg,transparent,var(--gold) 40%,var(--gold) 60%,transparent);
            margin-bottom:32px;
            position:relative;z-index:1;
        }
        .combat-divider::before,.combat-divider::after{
            content:'◆';
            position:absolute;top:-6px;
            color:var(--gold);font-size:8px;
        }
        .combat-divider::before{left:calc(50% - 4px)}

        .combat-arena{
            display:flex;gap:48px;
            align-items:flex-start;
            position:relative;z-index:1;
        }

        /* VS separator */
        .combat-vs{
            font-family:'Cinzel',serif;
            font-size:14px;
            color:var(--dim);
            letter-spacing:4px;
            display:flex;flex-direction:column;
            align-items:center;gap:10px;
            padding-top:72px;
        }
        .combat-vs::before,.combat-vs::after{
            content:'';display:block;
            width:1px;height:36px;
        }
        .combat-vs::before{background:linear-gradient(180deg,transparent,var(--bdr2))}
        .combat-vs::after{background:linear-gradient(180deg,var(--bdr2),transparent)}

        .die-wrap{text-align:center;width:140px}
        .die-label{
            font-family:'Cinzel',serif;
            font-size:11px;letter-spacing:5px;
            margin-bottom:14px;font-weight:700;
            text-transform:uppercase;
        }

        /* THE DICE */
        .die{
            width:110px;height:110px;
            background:var(--surf);
            border:1px solid var(--bdr2);
            border-radius:10px;
            font-size:76px;
            line-height:1;
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;margin:0 auto;
            transition:border-color .2s,box-shadow .2s,transform .1s;
            position:relative;
            font-family:'Share Tech Mono',monospace;
            color:var(--text);
        }
        .die.idle{
            border-color:var(--bdr2);
            animation:die-idle 3s ease-in-out infinite;
        }
        @keyframes die-idle{
            0%,100%{box-shadow:0 0 0px transparent}
            50%{box-shadow:0 0 18px rgba(200,168,75,.08)}
        }
        .die.rolling{
            animation:die-rattle .08s linear infinite;
            border-color:var(--combat);
            box-shadow:0 0 30px rgba(245,166,35,.2);
        }
        @keyframes die-rattle{
            0%{transform:translate(0,0) rotate(0deg)}
            20%{transform:translate(3px,-2px) rotate(3deg)}
            40%{transform:translate(-3px,2px) rotate(-3deg)}
            60%{transform:translate(2px,3px) rotate(2deg)}
            80%{transform:translate(-2px,-2px) rotate(-2deg)}
            100%{transform:translate(1px,1px) rotate(1deg)}
        }
        .die.landed{
            animation:die-land .28s cubic-bezier(.36,.07,.19,.97) forwards;
        }
        @keyframes die-land{
            0%{transform:scale(1.25) rotate(-8deg)}
            60%{transform:scale(.95)}
            100%{transform:scale(1) rotate(0deg)}
        }

        .die-hint{
            font-size:10px;color:var(--dim);
            letter-spacing:2px;text-transform:uppercase;
            margin-top:8px;height:14px;
            font-family:'Share Tech Mono',monospace;
            animation:hint-blink 2.2s ease-in-out infinite;
        }
        @keyframes hint-blink{0%,100%{opacity:.3}50%{opacity:.85}}

        .die-math{
            font-family:'Share Tech Mono',monospace;
            font-size:16px;font-weight:bold;
            margin-top:12px;height:20px;
            color:var(--text);letter-spacing:1px;
        }
        .die-modifiers{
            font-family:'Share Tech Mono',monospace;
            font-size:10px;color:var(--dim);
            margin-top:6px;letter-spacing:.5px;
            line-height:1.6;
        }

        #combat-result{
            font-family:'Cinzel',serif;
            font-size:16px;font-weight:700;
            letter-spacing:5px;
            height:26px;margin-top:28px;
            text-align:center;
            position:relative;z-index:1;
        }

        /* ─── REVIEW SCREEN ───────────────────────────────── */
        #review-screen{
            position:fixed;inset:0;
            background:var(--bg);
            display:none;
            flex-direction:column;
            align-items:center;justify-content:center;
            gap:18px;z-index:4000;
        }
        #winner-text{
            font-family:'Cinzel',serif;
            font-size:clamp(30px,6vw,54px);
            font-weight:900;letter-spacing:10px;
        }
        #review-screen .grid{pointer-events:none}
        .legend-text{
            font-family:'Share Tech Mono',monospace;
            font-size:11px;color:var(--dim);
            text-align:center;line-height:2;
            letter-spacing:1px;
        }

        /* ─── LOG ─────────────────────────────────────────── */
        #log{
            height:18vh;
            background:#020108;
            color:rgba(200,168,75,.45);
            border-top:1px solid var(--bdr);
            padding:10px 14px;
            font-family:'Share Tech Mono',monospace;
            font-size:11px;letter-spacing:.5px;
            overflow-y:auto;
            position:relative;z-index:1;
        }

        /* ─── MOBILE ──────────────────────────────────────── */
        @media(max-width:600px){
            .grid{grid-template-columns:repeat(4,62px);grid-template-rows:repeat(4,62px);gap:6px}
            .cell{width:62px;height:62px}
            .piece{width:42px;height:42px}
            .die{width:90px;height:90px;font-size:60px}
            .combat-arena{gap:24px}
            .die-wrap{width:110px}
        }
    </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby-screen">
    <div class="lobby-title"><em>4</em> × <em>4</em></div>
    <div class="lobby-sub">Shadow Protocol</div>
    <div class="gold-line"></div>
    <p style="font-size:12px;letter-spacing:3px;color:var(--dim);text-transform:uppercase">Aguardando segundo agente</p>
    <div class="link-box" id="invite-link" onclick="copyLink()">Gerando link...</div>
    <button onclick="copyLink()" style="border-color:var(--p1);color:var(--p1)">COPIAR LINK</button>
</div>

<!-- GAME -->
<div id="game-container" style="display:none">
    <div class="player-section">
        <div id="player-title">AGENTE</div>
        <div class="grid-wrapper">
            <div class="grid" id="grid-main"></div>
            <div class="pieces-layer" id="pieces-main"></div>
        </div>
        <div class="controls">
            <button id="btn-block"  onclick="setSkill('BLOCK')">◈ BARRICADA (2)</button>
            <button id="btn-trap"   onclick="setSkill('TRAP')">✦ ARMADILHA (2)</button>
            <button id="btn-sprint" onclick="setSkill('SPRINT')">⟫ AVANÇO (1)</button>
            <button id="btn-ready"  onclick="ready()">CONFIRMAR</button>
        </div>
        <div id="status-text">planejando...</div>
    </div>
</div>

<!-- COMBAT -->
<div id="combat-overlay">
    <div id="combat-title">CONFRONTO</div>
    <div class="combat-divider"></div>

    <div class="combat-arena">
        <div class="die-wrap">
            <div class="die-label" id="lbl-0" style="color:var(--p1)">Agente I</div>
            <div id="die-0" class="die idle" onclick="rollDie(0)">·</div>
            <div id="hint-0" class="die-hint">toque para rolar</div>
            <div id="math-0" class="die-math"></div>
            <div id="mod-0"  class="die-modifiers"></div>
        </div>

        <div class="combat-vs">VS</div>

        <div class="die-wrap">
            <div class="die-label" id="lbl-1" style="color:var(--p2)">Agente II</div>
            <div id="die-1" class="die idle" onclick="rollDie(1)">·</div>
            <div id="hint-1" class="die-hint">aguardando...</div>
            <div id="math-1" class="die-math"></div>
            <div id="mod-1"  class="die-modifiers"></div>
        </div>
    </div>

    <div id="combat-result"></div>
</div>

<!-- AFTERMATH -->
<div id="review-screen">
    <h1 id="winner-text">AFTERMATH</h1>
    <div id="after-grid-container" style="position:relative;width:max-content;margin:0 auto">
        <div id="after-grid" class="grid" style="background:var(--surf);border:1px solid var(--bdr2)"></div>
        <svg id="svg-paths" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10"></svg>
    </div>
    <div class="legend-text">
        ◈ = BARRICADA &nbsp;·&nbsp; ✦ = ARMADILHA &nbsp;·&nbsp; □ = CONFRONTO<br>
        <span style="opacity:.35;text-decoration:line-through;color:var(--text)">riscado</span> = destruído / desperdiçado
    </div>
    <button onclick="restartGame()" style="border-color:#22c55e;color:#22c55e;background:rgba(34,197,94,.07);padding:14px 32px;letter-spacing:3px">NOVA MISSÃO</button>
</div>

<!-- LOG -->
<div id="log">>> Shadow Protocol — Alpha 2.2 — Pronto.</div>

<script type="module">
    import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey:"AIzaSyA4QmmwIj2kMNDKOONi6ZbHPWcEApj9VG8",
        authDomain:"game-4x4.firebaseapp.com",
        databaseURL:"https://game-4x4-default-rtdb.firebaseio.com",
        projectId:"game-4x4",
        storageBucket:"game-4x4.firebasestorage.app",
        messagingSenderId:"32618206063",
        appId:"1:32618206063:web:eaec4df537d7d20c438e9a"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    window.roomId      = new URLSearchParams(window.location.search).get("sala");
    window.myId        = null;
    window.dbRef       = null;
    window.combatTimer = null;

    /* ── dice unicode faces ─────────────────────────────── */
    const DICE = ['','⚀','⚁','⚂','⚃','⚄','⚅'];

    /* ── layout helpers ─────────────────────────────────── */
    const getLayout = () => {
        const isMobile = window.innerWidth <= 600;
        const CELL = isMobile ? 62 : 75;
        const GAP  = isMobile ? 6  : 8;
        const PAD  = isMobile ? 10 : 14;
        const PO   = (CELL - (isMobile ? 42 : 50)) / 2;
        const STEP = CELL + GAP;
        return { PAD, CELL, STEP, PO };
    };
    const pPos  = (r,c) => { const L=getLayout(); return { top:L.PAD+r*L.STEP+L.PO, left:L.PAD+c*L.STEP+L.PO }; };
    const svgXY = (r,c) => { const L=getLayout(); return { x:L.PAD+c*L.STEP+L.CELL/2, y:L.PAD+r*L.STEP+L.CELL/2 }; };
    const arrEq = (a,b) => a&&b&&Array.isArray(a)&&Array.isArray(b)&&a[0]===b[0]&&a[1]===b[1];

    window.S = {
        players:[
            {id:0,pos:[0,0],target:false,skill:"",combatSkill:"",inv:{BLOCK:2,TRAP:2,SPRINT:1},ready:false,roll:0,permMod:0,history:[[0,0]],trapped:false,jumpedBlock:false,connected:false},
            {id:1,pos:[3,3],target:false,skill:"",combatSkill:"",inv:{BLOCK:2,TRAP:2,SPRINT:1},ready:false,roll:0,permMod:0,history:[[3,3]],trapped:false,jumpedBlock:false,connected:false}
        ],
        blocks:[],traps:[],spentRes:[],combatLocs:[],phase:"planning",winner:-1,isEndgame:false
    };

    /* ── multiplayer init ───────────────────────────────── */
    async function initMultiplayer() {
        if(!roomId){ roomId=Math.random().toString(36).substring(2,6).toUpperCase(); window.history.replaceState(null,null,`?sala=${roomId}`); }
        dbRef = ref(db,`rooms/${roomId}`);
        const snapshot = await get(dbRef);
        if(!snapshot.exists()){
            window.myId=0; S.players[0].connected=true; await set(dbRef,S);
        } else {
            const data=snapshot.val();
            if(!data.players[0].connected){window.myId=0;await update(ref(db,`rooms/${roomId}/players/0`),{connected:true});}
            else if(!data.players[1].connected){window.myId=1;await update(ref(db,`rooms/${roomId}/players/1`),{connected:true});}
            else{alert("Sala cheia!");return;}
        }
        document.getElementById('invite-link').innerText = window.location.href;
        onValue(dbRef,(snap)=>{
            if(snap.exists()){
                window.S=snap.val();
                if(!S.blocks)S.blocks=[];if(!S.traps)S.traps=[];
                if(!S.spentRes)S.spentRes=[];if(!S.combatLocs)S.combatLocs=[];
                if(S.players[0].permMod===undefined)S.players[0].permMod=0;
                if(S.players[1].permMod===undefined)S.players[1].permMod=0;
                if(!S.players[0].history)S.players[0].history=[[0,0]];
                if(!S.players[1].history)S.players[1].history=[[3,3]];
                syncUI();
            }
        });
        window.addEventListener("beforeunload",()=>{
            if(window.myId!==null) update(ref(db,`rooms/${roomId}/players/${window.myId}`),{connected:false,ready:false});
        });
    }

    /* ── sync ───────────────────────────────────────────── */
    function syncUI(){
        if(S.winner===0||S.winner===1){showAftermath(S.winner);return;}
        else{document.getElementById('review-screen').style.display='none';}

        if(S.players[0].connected&&S.players[1].connected){
            document.getElementById('lobby-screen').style.display='none';
            if(S.phase!=="combat") document.getElementById('game-container').style.display='flex';
        } else {
            document.getElementById('lobby-screen').style.display='flex';
            document.getElementById('game-container').style.display='none';
            document.getElementById('combat-overlay').style.display='none';
            return;
        }

        if(S.phase==="combat"){
            showCombatUI();
            if(window.myId===0&&S.players[0].roll>0&&S.players[1].roll>0){
                if(!window.combatTimer){
                    window.combatTimer=setTimeout(()=>{window.combatTimer=null;hostResolveCombat();},2800);
                }
            } else {
                if(window.combatTimer){clearTimeout(window.combatTimer);window.combatTimer=null;}
            }
        } else {
            document.getElementById('combat-overlay').style.display='none';
            renderBoard();
            if(window.myId===0&&S.players[0].ready&&S.players[1].ready){ hostProcessTurn(); }
        }
    }

    /* ── render board ───────────────────────────────────── */
    function renderBoard(){
        const me    = S.players[window.myId];
        const other = S.players[1-window.myId];

        const title = document.getElementById('player-title');
        title.innerText = `AGENTE ${window.myId===0?'I':'II'}`;
        title.style.color = window.myId===0?'var(--p1)':'var(--p2)';

        const g = document.getElementById('grid-main');
        if(g.children.length===0){
            for(let i=0;i<16;i++){
                let cell=document.createElement('div'); cell.className='cell';
                let r=Math.floor(i/4),c=i%4;
                cell.onclick=()=>onCellClick(r,c);
                g.appendChild(cell);
            }
            const layer=document.getElementById('pieces-main');
            [0,1].forEach(i=>{
                let d=document.createElement('div');
                d.id=`piece-${i}`;d.className=`piece p${i+1}-piece`;
                layer.appendChild(d);
            });
        }

        [0,1].forEach(i=>{
            const piece=document.getElementById(`piece-${i}`);
            const pos=pPos(S.players[i].pos[0],S.players[i].pos[1]);
            piece.style.top=pos.top+'px'; piece.style.left=pos.left+'px';
            piece.classList.toggle('trapped',S.players[i].trapped);
            piece.style.display=(i===window.myId)?'block':'none';
        });

        const cells=document.querySelectorAll('#grid-main .cell');
        cells.forEach((cell,i)=>{
            const r=Math.floor(i/4),c=i%4;
            const dist=Math.abs(r-me.pos[0])+Math.abs(c-me.pos[1]);
            const isSprint=!me.ready&&me.skill==='SPRINT'&&((Math.abs(r-me.pos[0])===2&&c===me.pos[1])||(r===me.pos[0]&&Math.abs(c-me.pos[1])===2));
            const fog=dist>1&&!isSprint;

            cell.className='cell'+(fog?' fog':'');
            cell.innerHTML='';

            if(me.target&&arrEq(me.target,[r,c])) cell.classList.add('selected');
            else if(!me.ready){
                if(isSprint) cell.classList.add('sprint-target');
                else if(dist===1&&me.skill!=='SPRINT') cell.classList.add('clickable');
            }

            if(dist<=1){
                if(arrEq(other.pos,[r,c])){
                    cell.innerHTML+=`<div style="width:26px;height:26px;border-radius:50%;background:var(--p${other.id+1});opacity:.25;box-shadow:0 0 12px var(--p${other.id+1})"></div>`;
                }
                S.blocks.forEach(b=>{if(b.r===r&&b.c===c) cell.innerHTML+=`<span style="color:var(--p${b.owner+1});font-size:26px;filter:drop-shadow(0 0 4px currentColor)">◈</span>`;});
            }
            S.traps.forEach(t=>{if(t.r===r&&t.c===c&&t.owner===window.myId) cell.innerHTML+=`<span style="color:var(--p${window.myId+1});font-size:18px;opacity:.85;filter:drop-shadow(0 0 4px currentColor)">✦</span>`;});
        });

        ['BLOCK','TRAP','SPRINT'].forEach(s=>{
            const btn=document.getElementById(`btn-${s.toLowerCase()}`);
            const icons={'BLOCK':'◈ BARRICADA','TRAP':'✦ ARMADILHA','SPRINT':'⟫ AVANÇO'};
            btn.className=me.skill===s?'active':'';
            btn.innerText=`${icons[s]} (${me.inv[s]})`;
            btn.disabled=me.inv[s]<=0||me.ready||me.trapped;
        });
        document.getElementById('btn-ready').disabled=me.ready||!me.target;

        let pMod=me.permMod>=0?`+${me.permMod}`:me.permMod;
        document.getElementById('status-text').innerText=me.ready?'aguardando adversário...':`modificador fixo: ${pMod}`;
    }

    /* ── cell click ─────────────────────────────────────── */
    window.onCellClick=(r,c)=>{
        const me=S.players[window.myId];
        if(me.ready)return;
        const dr=Math.abs(r-me.pos[0]),dc=Math.abs(c-me.pos[1]);
        let isValid=false;
        if(me.skill==='SPRINT') isValid=(dr===2&&dc===0)||(dr===0&&dc===2);
        else isValid=(dr+dc===1);
        if(!isValid)return;
        me.target=[r,c];
        renderBoard();
    };

    window.setSkill=(s)=>{
        const me=S.players[window.myId];
        if(me.ready)return;
        me.skill=me.skill===s?"":s;
        me.target=false;
        renderBoard();
    };

    window.ready=()=>{
        const me=S.players[window.myId];
        if(me.trapped) me.target=[...me.pos];
        me.ready=true;
        update(ref(db,`rooms/${roomId}/players/${window.myId}`),{target:me.target,skill:me.skill,ready:true});
    };

    /* ── roll die — with animation ──────────────────────── */
    window.rollDie=(id)=>{
        if(id!==window.myId||S.players[id].roll>0)return;
        const roll=Math.floor(Math.random()*6)+1;
        const die=document.getElementById(`die-${id}`);
        const hint=document.getElementById(`hint-${id}`);

        die.classList.remove('idle','landed');
        die.classList.add('rolling');
        if(hint) hint.style.opacity='0';

        let ticks=0;
        const interval=setInterval(()=>{
            die.textContent=DICE[Math.floor(Math.random()*6)+1];
            ticks++;
            if(ticks>=16){
                clearInterval(interval);
                die.classList.remove('rolling');
                die.classList.add('landed');
                die.textContent=DICE[roll];

                // colour the die by player
                const color=id===0?'var(--p1)':'var(--p2)';
                die.style.borderColor=color;
                die.style.color=color;
                die.style.boxShadow=`0 0 28px ${id===0?'var(--gp1)':'var(--gp2)'}`;

                update(ref(db,`rooms/${roomId}/players/${window.myId}`),{roll});
            }
        },55);
    };

    /* ── combat UI ──────────────────────────────────────── */
    function showCombatUI(){
        document.getElementById('game-container').style.display='none';
        document.getElementById('combat-overlay').style.display='flex';
        document.getElementById('combat-title').innerText=S.isEndgame?'CONFRONTO FINAL':'CONFRONTO';
        document.getElementById('combat-result').innerText='';

        [0,1].forEach(i=>{
            const p=S.players[i];
            const die=document.getElementById(`die-${i}`);
            const hint=document.getElementById(`hint-${i}`);
            const mathDiv=document.getElementById(`math-${i}`);
            const modDiv=document.getElementById(`mod-${i}`);

            if(p.roll>0){
                die.textContent=DICE[p.roll];
                die.classList.remove('idle','rolling');
                die.classList.add('landed');
                const clr=i===0?'var(--p1)':'var(--p2)';
                die.style.borderColor=clr;
                die.style.color=clr;
                die.style.boxShadow=`0 0 28px ${i===0?'var(--gp1)':'var(--gp2)'}`;
                die.style.cursor='default';
                if(hint) hint.textContent='';
            } else {
                if(!die.classList.contains('rolling')){
                    die.textContent='·';
                    die.style.borderColor='';die.style.color='';die.style.boxShadow='';
                    die.classList.remove('landed');
                    die.classList.add('idle');
                }
                die.style.cursor=(i===window.myId)?'pointer':'default';
                if(hint){
                    hint.textContent=(i===window.myId)?'toque para rolar':'aguardando...';
                    hint.style.opacity='1';
                }
            }

            const totalMod=getTotalMod(p);
            if(p.roll>0){
                const modStr=totalMod>=0?`+${totalMod}`:totalMod;
                mathDiv.innerText=`${p.roll} ${modStr} = ${p.roll+totalMod}`;
            } else { mathDiv.innerText=''; }

            const turnMod=getTurnMod(p);
            const pStr=p.permMod>=0?`+${p.permMod}`:p.permMod;
            const tStr=turnMod>=0?`+${turnMod}`:turnMod;
            const actStr=p.combatSkill?`${p.combatSkill} (${tStr})`:`nenhuma (${tStr})`;
            modDiv.innerText=`fixo ${pStr}  ·  ação ${actStr}`;
        });

        if(S.players[0].roll>0&&S.players[1].roll>0){
            const t1=S.players[0].roll+getTotalMod(S.players[0]);
            const t2=S.players[1].roll+getTotalMod(S.players[1]);
            const res=document.getElementById('combat-result');
            if(t1===t2){
                res.innerText=S.isEndgame?'EMPATE — NOVA RODADA':'EMPATE — RECURSOS DEVOLVIDOS';
                res.style.color='var(--combat)';
            } else {
                res.innerText=`VENCEDOR: AGENTE ${t1>t2?'I':'II'}`;
                res.style.color=t1>t2?'var(--p1)':'var(--p2)';
            }
        }
    }

    /* ── modifier helpers ───────────────────────────────── */
    function getTurnMod(p){ if(p.combatSkill==='SPRINT') return p.jumpedBlock?-2:-1; if(p.combatSkill==='BLOCK'||p.combatSkill==='TRAP') return 1; return 0; }
    function getTotalMod(p){ return p.permMod+getTurnMod(p); }

    /* ── host process turn ──────────────────────────────── */
    function hostProcessTurn(){
        const [p1,p2]=S.players;
        const swap=arrEq(p1.target,p2.pos)&&arrEq(p2.target,p1.pos);
        const same=arrEq(p1.target,p2.target);
        S.players.forEach(p=>{p.trapped=false;p.combatSkill=p.skill;});

        if(swap){
            S.players.forEach((p,i)=>{
                if(p.skill&&p.skill!=='SPRINT'){
                    S.spentRes.push({r:p.pos[0],c:p.pos[1],type:p.skill,owner:i,status:'wasted'});
                    p.inv[p.skill]--;p.permMod+=1;p.skill="";
                }
            });
            hostMove(0);hostMove(1);hostCheckWin();
        } else if(same&&!arrEq(p1.target,p1.pos)){
            S.players.forEach(p=>{
                if(p.skill==='SPRINT'){
                    const mr=(p.pos[0]+p.target[0])/2,mc=(p.pos[1]+p.target[1])/2;
                    p.jumpedBlock=S.blocks.some(b=>b.r===mr&&b.c===mc);
                }
            });
            S.phase="combat";
            S.players.forEach(p=>{p.roll=0;});
            set(dbRef,S);
        } else { hostMove(0);hostMove(1);hostCheckWin(); }
    }

    function hostMove(i){
        const p=S.players[i];
        let usedSkillMod=0;
        if(p.skill==='BLOCK'){S.blocks.push({r:p.pos[0],c:p.pos[1],owner:i});p.inv.BLOCK--;usedSkillMod=1;}
        if(p.skill==='TRAP'){S.traps.push({r:p.pos[0],c:p.pos[1],owner:i});p.inv.TRAP--;usedSkillMod=1;}
        if(p.skill==='SPRINT'){
            const mr=(p.pos[0]+p.target[0])/2,mc=(p.pos[1]+p.target[1])/2;
            const di=S.blocks.findIndex(b=>b.r===p.target[0]&&b.c===p.target[1]);
            const mi=S.blocks.findIndex(b=>b.r===mr&&b.c===mc);
            p.inv.SPRINT--;
            if(di!==-1){S.spentRes.push({...S.blocks[di],status:'broken'});S.blocks.splice(di,1);p.pos=[mr,mc];usedSkillMod=-1;}
            else if(mi!==-1){S.spentRes.push({...S.blocks[mi],status:'jumped'});S.blocks.splice(mi,1);p.jumpedBlock=true;p.pos=[...p.target];usedSkillMod=-2;}
            else{p.pos=[...p.target];usedSkillMod=-1;}
        } else {
            const bi=S.blocks.findIndex(b=>b.r===p.target[0]&&b.c===p.target[1]);
            if(bi!==-1){S.spentRes.push({...S.blocks[bi],status:'broken'});S.blocks.splice(bi,1);}
            else{p.pos=[...p.target];}
        }
        const ti=S.traps.findIndex(t=>t.r===p.pos[0]&&t.c===p.pos[1]&&t.owner!==i);
        if(ti!==-1){S.spentRes.push({...S.traps[ti],status:'triggered'});S.traps.splice(ti,1);p.trapped=true;}
        p.permMod+=usedSkillMod;p.history.push([...p.pos]);p.skill="";
    }

    function hostResolveCombat(){
        try{
            const [p1,p2]=S.players;
            const t1=p1.roll+getTotalMod(p1);
            const t2=p2.roll+getTotalMod(p2);
            if(p1.target&&Array.isArray(p1.target)) S.combatLocs.push([...p1.target]);
            if(S.isEndgame){
                if(t1===t2){S.players.forEach(p=>p.roll=0);set(dbRef,S);return;}
                S.winner=t1>t2?0:1;set(dbRef,S);return;
            }
            if(t1===t2){ S.players.forEach(p=>p.ready=false); }
            else{
                const wi=t1>t2?0:1,li=1-wi;
                hostMove(wi);
                S.players[li].history.push([...S.players[li].pos]);
                if(S.players[li].combatSkill){
                    S.players[li].inv[S.players[li].combatSkill]--;
                    S.players[li].permMod+=getTurnMod(S.players[li]);
                    S.spentRes.push({r:S.players[li].pos[0],c:S.players[li].pos[1],type:S.players[li].combatSkill,owner:li,status:'wasted'});
                }
            }
            S.phase="planning";
            S.players.forEach(p=>{p.roll=0;p.combatSkill="";p.jumpedBlock=false;});
            hostCheckWin();
        } catch(e){ console.error("Erro na resolução:",e); }
    }

    function hostCheckWin(){
        const v1=arrEq(S.players[0].pos,[3,3]),v2=arrEq(S.players[1].pos,[0,0]);
        if(v1&&v2){S.isEndgame=true;S.phase="combat";S.players.forEach(p=>{p.roll=0;p.combatSkill=p.skill;});}
        else if(v1) S.winner=0;
        else if(v2) S.winner=1;
        else S.players.forEach(p=>{p.ready=false;p.target=false;});
        set(dbRef,S);
    }

    /* ── aftermath ──────────────────────────────────────── */
    function showAftermath(w){
        document.getElementById('lobby-screen').style.display='none';
        document.getElementById('game-container').style.display='none';
        document.getElementById('combat-overlay').style.display='none';
        document.getElementById('review-screen').style.display='flex';
        document.getElementById('winner-text').innerText=(w===window.myId)?'MISSÃO CUMPRIDA':'MISSÃO FALHOU';
        document.getElementById('winner-text').style.color=(w===window.myId)?'var(--p1)':'var(--p2)';

        const grid=document.getElementById('after-grid');
        grid.innerHTML='';
        for(let i=0;i<16;i++){
            const r=Math.floor(i/4),c=i%4;
            const cell=document.createElement('div'); cell.className='cell';
            if(S.combatLocs.some(l=>arrEq(l,[r,c]))) cell.classList.add('cell-combat');
            let html='';
            S.blocks.forEach(b=>{if(b.r===r&&b.c===c) html+=`<span style="color:var(--p${b.owner+1});font-size:22px">◈</span>`;});
            S.traps.forEach(t=>{if(t.r===r&&t.c===c) html+=`<span style="color:var(--p${t.owner+1});font-size:16px">✦</span>`;});
            S.spentRes.forEach(s=>{
                if(s.r===r&&s.c===c){
                    const ic=s.type==='BLOCK'?'◈':s.type==='TRAP'?'✦':'⟫';
                    const sz=s.type==='BLOCK'?'22px':s.type==='TRAP'?'16px':'18px';
                    html+=`<span class="broken" style="color:var(--p${s.owner+1});font-size:${sz};margin:0 2px">${ic}</span>`;
                }
            });
            cell.innerHTML=`<div style="position:relative;z-index:20;display:flex;gap:4px;flex-wrap:wrap;justify-content:center;align-items:center">${html}</div>`;
            grid.appendChild(cell);
        }
        setTimeout(()=>drawSVG(),100);
    }

    function drawSVG(){
        const svg=document.getElementById('svg-paths');
        const grid=document.getElementById('after-grid');
        svg.setAttribute('viewBox',`0 0 ${grid.offsetWidth} ${grid.offsetHeight}`);
        svg.innerHTML='';
        [0,1].forEach(pi=>{
            let d='';
            S.players[pi].history.forEach((pos,idx)=>{
                const {x,y}=svgXY(pos[0],pos[1]);
                d+=(idx===0?'M':'L')+`${x} ${y} `;
                const dot=document.createElementNS("http://www.w3.org/2000/svg","circle");
                dot.setAttribute("cx",x);dot.setAttribute("cy",y);dot.setAttribute("r","4");
                dot.setAttribute("fill",`var(--p${pi+1})`);
                svg.appendChild(dot);
            });
            const path=document.createElementNS("http://www.w3.org/2000/svg","path");
            path.setAttribute("d",d.trim());
            path.setAttribute("stroke",`var(--p${pi+1})`);
            path.setAttribute("stroke-width","3");
            path.setAttribute("fill","none");
            path.setAttribute("stroke-linejoin","round");
            path.setAttribute("opacity","0.35");
            svg.appendChild(path);
        });
    }

    /* ── restart ────────────────────────────────────────── */
    window.restartGame=()=>{
        const resetState={
            players:[
                {id:0,pos:[0,0],target:false,skill:"",combatSkill:"",inv:{BLOCK:2,TRAP:2,SPRINT:1},ready:false,roll:0,permMod:0,history:[[0,0]],trapped:false,jumpedBlock:false,connected:S.players[0].connected},
                {id:1,pos:[3,3],target:false,skill:"",combatSkill:"",inv:{BLOCK:2,TRAP:2,SPRINT:1},ready:false,roll:0,permMod:0,history:[[3,3]],trapped:false,jumpedBlock:false,connected:S.players[1].connected}
            ],
            blocks:[],traps:[],spentRes:[],combatLocs:[],phase:"planning",winner:-1,isEndgame:false
        };
        set(dbRef,resetState);
    };

    window.copyLink=()=>{ navigator.clipboard.writeText(window.location.href); alert("Link copiado."); };

    initMultiplayer();
</script>
</body>
